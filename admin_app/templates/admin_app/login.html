{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouExcel Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f2f4f8;
            font-family: Arial, sans-serif;
        }
        .main-container {
            display: flex;
            min-height: 100vh;
        }
        .left-side {
            flex: 1;
            background-color: #e0e7ef;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .left-side img {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
        }
        .right-side {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-shadow: -5px 0 10px rgba(0,0,0,0.05);
        }
        .login-box {
            width: 100%;
            max-width: 400px;
        }
        .logo {
            display: block;
            margin: 0 auto 20px;
            height: 140px;
        }
        .login-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .form-label {
            font-weight: bold;
        }
        .btn-login {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            border-radius: 6px;
        }
        .btn-login:hover {
            background-color: #45a049;
        }
        .message-box {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- Left Side Image -->
    <div class="left-side">
        <img src="{% static 'images/group_photo.jpg' %}" alt="Group Image">
    </div>

    <!-- Right Side Login -->
    <div class="right-side">
        <div class="login-box">
            <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
            <div class="login-title">Login</div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} message-box" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'custom_login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-login btn-lg">Login</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
