{% extends 'base.html' %}

{% block content %}
<h2>Manage Staff</h2>

<a href="{% url 'add_staff' %}" class="btn btn-primary">Add New Staff</a>

<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for staff in staffs %}
        <tr>
            <td>{{ staff.admin.first_name }} {{ staff.admin.last_name }}</td>
            <td>{{ staff.admin.email }}</td>
            <td>{{ staff.address }}</td>
            <td>
                <a href="{% url 'delete_staff' staff.id %}" class="btn btn-danger btn-sm" 
                   onclick="return confirm('Are you sure you want to delete this staff member?')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No staff members found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
