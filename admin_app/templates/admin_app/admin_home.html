{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Admin Dashboard</h2>
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Students</h5>
                    <p class="card-text">Total: {{ student_count }}</p>
                    <a href="{% url 'student_app:manage_students' %}" class="btn btn-primary">Manage Students</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Staff</h5>
                    <p class="card-text">Total: {{ staff_count }}</p>
                    <a href="{% url 'manage_staff' %}" class="btn btn-primary">Manage Staff</a>
                </div>
            </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Courses</h5>
                    <p class="card-text">Total: {{ course_count }}</p>
                    <a href="{% url 'course_app:manage_courses' %}" class="btn btn-primary">Manage Courses</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Subjects</h5>
                    <p class="card-text">Total: {{ subject_count }}</p>
                    <a href="{% url 'manage_subjects' %}" class="btn btn-primary">Manage Subjects</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
