{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Edit Student</h2>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ student.name }}" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ student.email }}" required>
        </div>

        <div class="form-group">
            <label for="course">Course:</label>
            <select class="form-control" id="course" name="course" required>
                {% for course in courses %}
                    <option value="{{ course.id }}" {% if course.id == student.course.id %}selected{% endif %}>
                        {{ course.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" class="form-control" id="phone" name="phone" value="{{ student.phone }}" required>
        </div>

        <button type="submit" class="btn btn-primary mt-3">Update Student</button>
        <a href="{% url 'student_app:manage_students' %}" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>
{% endblock %}
