{% extends 'base.html' %}

{% block content %}
<h2>Manage Students</h2>

<a href="{% url 'student_app:add_student' %}" class="btn btn-primary mb-3">Add New Student</a>

<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>
            <td>{{ student.phone }}</td>
            <td>
                <a href="{% url 'student_app:edit_student' student.id %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'student_app:delete_student' student.id %}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No students found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
